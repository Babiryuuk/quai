<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Plan des quais – temps réel</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f4f4;
  }

  #container {
    position: relative;
    width: 1400px;
    margin: 20px auto;
  }

  #container img {
    width: 100%;
    display: block;
  }

  .dock {
    position: absolute;
    width: 36px;
    height: 22px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: bold;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    user-select: none;
    z-index: 10;
  }

  .red { background: #c0392b; }
  .green { background: #27ae60; }
</style>
</head>

<body>

<div id="container">
  <!-- IMAGE DU PLAN -->
  <img src="plan.png" alt="Plan des quais">

  <!-- LES 100 CASES SERONT CRÉÉES ICI -->
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

/* 🔐 CONFIG FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyBpKGxGcC6IHvNTu9bpTwi_4jZIAF5olg",
  authDomain: "projet-plan-dynamique-pour-ma.firebaseapp.com",
  projectId: "projet-plan-dynamique-pour-ma",
  storageBucket: "projet-plan-dynamique-pour-ma.appspot.com",
  messagingSenderId: "1008307493478",
  appId: "1:1008307493478:web:e7fcc54f4bba624da26ba7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const container = document.getElementById("container");

/* 📐 PARAMÈTRES DE POSITIONNEMENT */
const startX = 300;   // position horizontale de départ
const startY = 600;   // position verticale
const gapX = 42;      // espace entre cases
const perRow = 20;    // cases par ligne

/* 🔁 CRÉATION DES 100 QUAIS */
for (let i = 1; i <= 100; i++) {
  const id = "Q" + String(i).padStart(2, "0");

  const dock = document.createElement("div");
  dock.className = "dock red";
  dock.textContent = i;
  dock.dataset.id = id;

  const col = (i - 1) % perRow;
  const row = Math.floor((i - 1) / perRow);

  dock.style.left = (startX + col * gapX) + "px";
  dock.style.top  = (startY + row * 30) + "px";

  container.appendChild(dock);

  const ref = doc(db, "quais", id);

  /* clic → bascule rouge / vert */
  dock.addEventListener("click", async () => {
    const snap = await getDoc(ref);
    const current = snap.exists() ? snap.data().etat : "red";
    const next = current === "green" ? "red" : "green";
    await setDoc(ref, { etat: next }, { merge: true });
  });

  /* temps réel */
  onSnapshot(ref, snap => {
    dock.classList.remove("red", "green");
    dock.classList.add(
      snap.exists() ? snap.data().etat : "red"
    );
  });
}
</script>

</body>
</html>
